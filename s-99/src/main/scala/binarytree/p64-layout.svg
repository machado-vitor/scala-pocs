<svg xmlns="http://www.w3.org/2000/svg" width="700" height="430" font-family="Menlo, Monaco, monospace">
  <style>
    .node-circle { fill: #4A90D9; stroke: #2C5F8A; stroke-width: 2; }
    .node-label { fill: white; font-size: 14px; font-weight: bold; text-anchor: middle; dominant-baseline: central; }
    .edge { stroke: #666; stroke-width: 2; fill: none; }
    .grid-dot { fill: #DDD; }
    .level-label { fill: #999; font-size: 11px; text-anchor: end; dominant-baseline: central; }
    .x-label { fill: #999; font-size: 10px; text-anchor: middle; dominant-baseline: central; }
    .title { fill: #333; font-size: 16px; font-weight: bold; text-anchor: middle; }
    .subtitle { fill: #777; font-size: 12px; text-anchor: middle; }
    .note { fill: #E07040; font-size: 11px; text-anchor: start; dominant-baseline: central; font-style: italic; }
  </style>

  <!-- Grid: offsetX=60, cellW=40, offsetY=70, cellH=65 -->
  <!-- pixel(x) = 60 + (x-1)*40, pixel(y) = 70 + (y-1)*65 -->

  <!-- Title -->
  <text x="260" y="25" class="title">P64 — layoutBinaryTree</text>
  <text x="260" y="45" class="subtitle">Tree.fromList(List('n','k','m','c','a','e','d','g','u','p','q'))  —  width = 11</text>

  <!-- X-axis labels: 1..11 -->
  <text x="60"  y="67" class="x-label">1</text>
  <text x="100" y="67" class="x-label">2</text>
  <text x="140" y="67" class="x-label">3</text>
  <text x="180" y="67" class="x-label">4</text>
  <text x="220" y="67" class="x-label">5</text>
  <text x="260" y="67" class="x-label">6</text>
  <text x="300" y="67" class="x-label">7</text>
  <text x="340" y="67" class="x-label">8</text>
  <text x="380" y="67" class="x-label">9</text>
  <text x="420" y="67" class="x-label">10</text>
  <text x="460" y="67" class="x-label">11</text>

  <!-- Level labels -->
  <text x="42" y="85"  class="level-label">y=1</text>
  <text x="42" y="150" class="level-label">y=2</text>
  <text x="42" y="215" class="level-label">y=3</text>
  <text x="42" y="280" class="level-label">y=4</text>
  <text x="42" y="345" class="level-label">y=5</text>

  <!-- Grid dots for empty slots -->
  <!-- y=1: all except 8 -->
  <circle cx="60"  cy="85" r="2" class="grid-dot"/>
  <circle cx="100" cy="85" r="2" class="grid-dot"/>
  <circle cx="140" cy="85" r="2" class="grid-dot"/>
  <circle cx="180" cy="85" r="2" class="grid-dot"/>
  <circle cx="220" cy="85" r="2" class="grid-dot"/>
  <circle cx="260" cy="85" r="2" class="grid-dot"/>
  <circle cx="300" cy="85" r="2" class="grid-dot"/>
  <circle cx="380" cy="85" r="2" class="grid-dot"/>
  <circle cx="420" cy="85" r="2" class="grid-dot"/>
  <circle cx="460" cy="85" r="2" class="grid-dot"/>
  <!-- y=2: all except 6, 11 -->
  <circle cx="60"  cy="150" r="2" class="grid-dot"/>
  <circle cx="100" cy="150" r="2" class="grid-dot"/>
  <circle cx="140" cy="150" r="2" class="grid-dot"/>
  <circle cx="180" cy="150" r="2" class="grid-dot"/>
  <circle cx="220" cy="150" r="2" class="grid-dot"/>
  <circle cx="300" cy="150" r="2" class="grid-dot"/>
  <circle cx="340" cy="150" r="2" class="grid-dot"/>
  <circle cx="380" cy="150" r="2" class="grid-dot"/>
  <circle cx="420" cy="150" r="2" class="grid-dot"/>
  <!-- y=3: all except 2, 7, 9 -->
  <circle cx="60"  cy="215" r="2" class="grid-dot"/>
  <circle cx="140" cy="215" r="2" class="grid-dot"/>
  <circle cx="180" cy="215" r="2" class="grid-dot"/>
  <circle cx="220" cy="215" r="2" class="grid-dot"/>
  <circle cx="260" cy="215" r="2" class="grid-dot"/>
  <circle cx="340" cy="215" r="2" class="grid-dot"/>
  <circle cx="420" cy="215" r="2" class="grid-dot"/>
  <circle cx="460" cy="215" r="2" class="grid-dot"/>
  <!-- y=4: all except 1, 4, 10 -->
  <circle cx="100" cy="280" r="2" class="grid-dot"/>
  <circle cx="140" cy="280" r="2" class="grid-dot"/>
  <circle cx="220" cy="280" r="2" class="grid-dot"/>
  <circle cx="260" cy="280" r="2" class="grid-dot"/>
  <circle cx="300" cy="280" r="2" class="grid-dot"/>
  <circle cx="340" cy="280" r="2" class="grid-dot"/>
  <circle cx="380" cy="280" r="2" class="grid-dot"/>
  <circle cx="460" cy="280" r="2" class="grid-dot"/>
  <!-- y=5: all except 3, 5 -->
  <circle cx="60"  cy="345" r="2" class="grid-dot"/>
  <circle cx="100" cy="345" r="2" class="grid-dot"/>
  <circle cx="180" cy="345" r="2" class="grid-dot"/>
  <circle cx="260" cy="345" r="2" class="grid-dot"/>
  <circle cx="300" cy="345" r="2" class="grid-dot"/>
  <circle cx="340" cy="345" r="2" class="grid-dot"/>
  <circle cx="380" cy="345" r="2" class="grid-dot"/>
  <circle cx="420" cy="345" r="2" class="grid-dot"/>
  <circle cx="460" cy="345" r="2" class="grid-dot"/>

  <!-- Edges -->
  <!-- n(8,1) -> k(6,2) -->
  <line x1="340" y1="85" x2="260" y2="150" class="edge"/>
  <!-- n(8,1) -> u(11,2) -->
  <line x1="340" y1="85" x2="460" y2="150" class="edge"/>
  <!-- k(6,2) -> c(2,3) -->
  <line x1="260" y1="150" x2="100" y2="215" class="edge"/>
  <!-- k(6,2) -> m(7,3) -->
  <line x1="260" y1="150" x2="300" y2="215" class="edge"/>
  <!-- c(2,3) -> a(1,4) -->
  <line x1="100" y1="215" x2="60" y2="280" class="edge"/>
  <!-- c(2,3) -> e(4,4) -->
  <line x1="100" y1="215" x2="180" y2="280" class="edge"/>
  <!-- u(11,2) -> p(9,3) -->
  <line x1="460" y1="150" x2="380" y2="215" class="edge"/>
  <!-- p(9,3) -> q(10,4) -->
  <line x1="380" y1="215" x2="420" y2="280" class="edge"/>
  <!-- e(4,4) -> d(3,5) -->
  <line x1="180" y1="280" x2="140" y2="345" class="edge"/>
  <!-- e(4,4) -> g(5,5) -->
  <line x1="180" y1="280" x2="220" y2="345" class="edge"/>

  <!-- Nodes -->
  <!-- n at (8,1) -> px(340, 85) -->
  <circle cx="340" cy="85" r="15" class="node-circle"/>
  <text x="340" y="85" class="node-label">n</text>
  <!-- k at (6,2) -> px(260, 150) -->
  <circle cx="260" cy="150" r="15" class="node-circle"/>
  <text x="260" y="150" class="node-label">k</text>
  <!-- u at (11,2) -> px(460, 150) -->
  <circle cx="460" cy="150" r="15" class="node-circle"/>
  <text x="460" y="150" class="node-label">u</text>
  <!-- c at (2,3) -> px(100, 215) -->
  <circle cx="100" cy="215" r="15" class="node-circle"/>
  <text x="100" y="215" class="node-label">c</text>
  <!-- m at (7,3) -> px(300, 215) -->
  <circle cx="300" cy="215" r="15" class="node-circle"/>
  <text x="300" y="215" class="node-label">m</text>
  <!-- p at (9,3) -> px(380, 215) -->
  <circle cx="380" cy="215" r="15" class="node-circle"/>
  <text x="380" y="215" class="node-label">p</text>
  <!-- a at (1,4) -> px(60, 280) -->
  <circle cx="60" cy="280" r="15" class="node-circle"/>
  <text x="60" y="280" class="node-label">a</text>
  <!-- e at (4,4) -> px(180, 280) -->
  <circle cx="180" cy="280" r="15" class="node-circle"/>
  <text x="180" y="280" class="node-label">e</text>
  <!-- q at (10,4) -> px(420, 280) -->
  <circle cx="420" cy="280" r="15" class="node-circle"/>
  <text x="420" y="280" class="node-label">q</text>
  <!-- d at (3,5) -> px(140, 345) -->
  <circle cx="140" cy="345" r="15" class="node-circle"/>
  <text x="140" y="345" class="node-label">d</text>
  <!-- g at (5,5) -> px(220, 345) -->
  <circle cx="220" cy="345" r="15" class="node-circle"/>
  <text x="220" y="345" class="node-label">g</text>

  <!-- Coordinate labels -->
  <text x="340" y="108" class="x-label" fill="#2C5F8A" font-size="9">[8,1]</text>
  <text x="260" y="173" class="x-label" fill="#2C5F8A" font-size="9">[6,2]</text>
  <text x="460" y="173" class="x-label" fill="#2C5F8A" font-size="9">[11,2]</text>
  <text x="100" y="238" class="x-label" fill="#2C5F8A" font-size="9">[2,3]</text>
  <text x="300" y="238" class="x-label" fill="#2C5F8A" font-size="9">[7,3]</text>
  <text x="380" y="238" class="x-label" fill="#2C5F8A" font-size="9">[9,3]</text>
  <text x="60"  y="303" class="x-label" fill="#2C5F8A" font-size="9">[1,4]</text>
  <text x="180" y="303" class="x-label" fill="#2C5F8A" font-size="9">[4,4]</text>
  <text x="420" y="303" class="x-label" fill="#2C5F8A" font-size="9">[10,4]</text>
  <text x="140" y="368" class="x-label" fill="#2C5F8A" font-size="9">[3,5]</text>
  <text x="220" y="368" class="x-label" fill="#2C5F8A" font-size="9">[5,5]</text>

  <!-- Note about inorder -->
  <rect x="20" y="388" width="480" height="25" rx="4" fill="#F5F5F5" stroke="#DDD"/>
  <text x="30" y="400" font-size="10" fill="#E07040" dominant-baseline="central" font-style="italic">x = inorder position: a(1) c(2) d(3) e(4) g(5) k(6) m(7) n(8) p(9) q(10) u(11)</text>
</svg>