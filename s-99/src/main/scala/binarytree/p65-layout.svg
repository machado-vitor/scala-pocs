  <text x="668" y="238" class="x-label" fill="#2C5F8A" font-size="9">[19,3]</text>
  <text x="92"  y="303" class="x-label" fill="#2C5F8A" font-size="9">[1,4]</text>
  <text x="220" y="303" class="x-label" fill="#2C5F8A" font-size="9">[5,4]</text>
  <text x="732" y="303" class="x-label" fill="#2C5F8A" font-size="9">[21,4]</text>
  <text x="188" y="368" class="x-label" fill="#2C5F8A" font-size="9">[4,5]</text>
  <text x="252" y="368" class="x-label" fill="#2C5F8A" font-size="9">[6,5]</text>

  <!-- Legend -->
  <rect x="20" y="388" width="800" height="25" rx="4" fill="#F5F5F5" stroke="#DDD"/>
  <circle cx="40" cy="400" r="3" class="grid-dot"/>
  <text x="50" y="400" font-size="10" fill="#999" dominant-baseline="central">empty slot</text>
  <circle cx="140" cy="400" r="6" class="node-circle"/>
  <text x="152" y="400" font-size="10" fill="#666" dominant-baseline="central">node [x,y]</text>
  <text x="280" y="400" font-size="10" fill="#E07040" dominant-baseline="central" font-style="italic">sep = parent-to-child distance at that level</text>
</svg>