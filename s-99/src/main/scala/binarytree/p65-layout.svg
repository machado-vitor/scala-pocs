  <!-- Coordinate labels under each node -->
  <text x="540" y="108" class="x-label" fill="#2C5F8A" font-size="9">[15,1]</text>
  <text x="284" y="173" class="x-label" fill="#2C5F8A" font-size="9">[7,2]</text>
