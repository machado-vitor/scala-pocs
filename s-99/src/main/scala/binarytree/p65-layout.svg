  <!-- n(15,1) -> u(23,2) -->
  <line x1="540" y1="85" x2="796" y2="150" class="edge"/>
  <!-- k(7,2) -> c(3,3) -->
  <line x1="284" y1="150" x2="156" y2="215" class="edge"/>
  <!-- k(7,2) -> m(11,3) -->
  <line x1="284" y1="150" x2="412" y2="215" class="edge"/>
  <!-- c(3,3) -> a(1,4) -->
  <line x1="156" y1="215" x2="92" y2="280" class="edge"/>
  <!-- c(3,3) -> e(5,4) -->
  <line x1="156" y1="215" x2="220" y2="280" class="edge"/>
  <!-- u(23,2) -> p(19,3) -->
  <line x1="796" y1="150" x2="668" y2="215" class="edge"/>
  <!-- p(19,3) -> q(21,4) -->
  <line x1="668" y1="215" x2="732" y2="280" class="edge"/>
  <!-- e(5,4) -> d(4,5) -->
  <line x1="220" y1="280" x2="188" y2="345" class="edge"/>
  <!-- e(5,4) -> g(6,5) -->
  <line x1="220" y1="280" x2="252" y2="345" class="edge"/>

  <!-- Nodes -->
  <!-- n at (15, 1) → pixel (540, 85) -->
  <circle cx="540" cy="85" r="15" class="node-circle"/>
  <text x="540" y="85" class="node-label">n</text>

  <!-- k at (7, 2) → pixel (284, 150) -->
  <circle cx="284" cy="150" r="15" class="node-circle"/>
  <text x="284" y="150" class="node-label">k</text>

  <!-- u at (23, 2) → pixel (796, 150) -->
  <circle cx="796" cy="150" r="15" class="node-circle"/>
  <text x="796" y="150" class="node-label">u</text>

  <!-- c at (3, 3) → pixel (156, 215) -->
  <circle cx="156" cy="215" r="15" class="node-circle"/>
  <text x="156" y="215" class="node-label">c</text>

  <!-- m at (11, 3) → pixel (412, 215) -->
  <circle cx="412" cy="215" r="15" class="node-circle"/>
  <text x="412" y="215" class="node-label">m</text>

  <!-- p at (19, 3) → pixel (668, 215) -->
  <circle cx="668" cy="215" r="15" class="node-circle"/>
  <text x="668" y="215" class="node-label">p</text>

  <!-- a at (1, 4) → pixel (92, 280) -->
