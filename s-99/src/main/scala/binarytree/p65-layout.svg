  <circle cx="764" cy="85" r="2" class="grid-dot"/>
  <circle cx="796" cy="85" r="2" class="grid-dot"/>

  <!-- Level 2: all except 7, 23 -->
  <circle cx="92"  cy="150" r="2" class="grid-dot"/>
  <circle cx="124" cy="150" r="2" class="grid-dot"/>
  <circle cx="156" cy="150" r="2" class="grid-dot"/>
  <circle cx="188" cy="150" r="2" class="grid-dot"/>
  <circle cx="220" cy="150" r="2" class="grid-dot"/>
  <circle cx="252" cy="150" r="2" class="grid-dot"/>
  <circle cx="316" cy="150" r="2" class="grid-dot"/>
  <circle cx="348" cy="150" r="2" class="grid-dot"/>
