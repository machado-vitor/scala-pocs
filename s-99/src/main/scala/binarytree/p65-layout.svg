<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 420" font-family="Menlo, Monaco, monospace">
  <style>
    .node-circle { fill: #4A90D9; stroke: #2C5F8A; stroke-width: 2; }
    .node-label { fill: white; font-size: 14px; font-weight: bold; text-anchor: middle; dominant-baseline: central; }
    .edge { stroke: #666; stroke-width: 2; fill: none; }
    .grid-dot { fill: #DDD; }
    .level-label { fill: #999; font-size: 11px; text-anchor: end; dominant-baseline: central; }
    .x-label { fill: #999; font-size: 10px; text-anchor: middle; dominant-baseline: central; }
    .sep-label { fill: #E07040; font-size: 11px; text-anchor: start; dominant-baseline: central; font-style: italic; }
    .title { fill: #333; font-size: 16px; font-weight: bold; text-anchor: middle; }
    .subtitle { fill: #777; font-size: 12px; text-anchor: middle; }
  </style>

  <!-- Title -->
  <text x="410" y="25" class="title">P65 — layoutBinaryTree2</text>
  <text x="410" y="45" class="subtitle">Tree.fromList(List('n','k','m','c','a','e','d','g','u','p','q'))  —  maxDepth = 5</text>

  <!-- Grid and layout constants: offsetX=60, offsetY=70, cellW=32, cellH=65 -->
  <!-- x positions 1..23, y positions 1..5 -->

  <!-- X-axis labels -->
  <text x="92" y="67" class="x-label">1</text>
  <text x="124" y="67" class="x-label">2</text>
  <text x="156" y="67" class="x-label">3</text>
  <text x="188" y="67" class="x-label">4</text>
