<svg xmlns="http://www.w3.org/2000/svg" width="700" height="430" font-family="Menlo, Monaco, monospace">
  <style>
    .node-circle { fill: #4A90D9; stroke: #2C5F8A; stroke-width: 2; }
    .node-label { fill: white; font-size: 14px; font-weight: bold; text-anchor: middle; dominant-baseline: central; }
    .edge { stroke: #666; stroke-width: 2; fill: none; }
    .grid-dot { fill: #DDD; }
    .level-label { fill: #999; font-size: 11px; text-anchor: end; dominant-baseline: central; }
    .x-label { fill: #999; font-size: 10px; text-anchor: middle; dominant-baseline: central; }
    .title { fill: #333; font-size: 16px; font-weight: bold; text-anchor: middle; }
    .subtitle { fill: #777; font-size: 12px; text-anchor: middle; }
  </style>

  <!-- Grid: offsetX=70, cellW=45, offsetY=70, cellH=65 -->
  <!-- pixel(x) = 70 + (x-1)*45, pixel(y) = 70 + (y-1)*65 -->

  <!-- Title -->
  <text x="210" y="25" class="title">P66 — layoutBinaryTree3</text>
  <text x="210" y="45" class="subtitle">Tree.fromList(List('n','k','m','c','a','e','d','g','u','p','q'))  —  width = 7</text>

  <!-- X-axis labels: 1..7 -->
  <text x="70"  y="67" class="x-label">1</text>
  <text x="115" y="67" class="x-label">2</text>
  <text x="160" y="67" class="x-label">3</text>
  <text x="205" y="67" class="x-label">4</text>
  <text x="250" y="67" class="x-label">5</text>
  <text x="295" y="67" class="x-label">6</text>
  <text x="340" y="67" class="x-label">7</text>

  <!-- Level labels -->
  <text x="52" y="85"  class="level-label">y=1</text>
  <text x="52" y="150" class="level-label">y=2</text>
  <text x="52" y="215" class="level-label">y=3</text>
  <text x="52" y="280" class="level-label">y=4</text>
  <text x="52" y="345" class="level-label">y=5</text>

  <!-- Grid dots for empty slots -->
  <!-- y=1: all except 5 -->
  <circle cx="70"  cy="85" r="2" class="grid-dot"/>
  <circle cx="115" cy="85" r="2" class="grid-dot"/>
  <circle cx="160" cy="85" r="2" class="grid-dot"/>
  <circle cx="205" cy="85" r="2" class="grid-dot"/>
  <circle cx="295" cy="85" r="2" class="grid-dot"/>
  <circle cx="340" cy="85" r="2" class="grid-dot"/>
  <!-- y=2: all except 3, 7 -->
  <circle cx="70"  cy="150" r="2" class="grid-dot"/>
  <circle cx="115" cy="150" r="2" class="grid-dot"/>
  <circle cx="205" cy="150" r="2" class="grid-dot"/>
  <circle cx="250" cy="150" r="2" class="grid-dot"/>
  <circle cx="295" cy="150" r="2" class="grid-dot"/>
  <!-- y=3: all except 2, 4, 6 -->
  <circle cx="70"  cy="215" r="2" class="grid-dot"/>
  <circle cx="160" cy="215" r="2" class="grid-dot"/>
  <circle cx="250" cy="215" r="2" class="grid-dot"/>
  <circle cx="340" cy="215" r="2" class="grid-dot"/>
  <!-- y=4: all except 1, 3, 7 -->
  <circle cx="115" cy="280" r="2" class="grid-dot"/>
  <circle cx="205" cy="280" r="2" class="grid-dot"/>
  <circle cx="250" cy="280" r="2" class="grid-dot"/>
  <circle cx="295" cy="280" r="2" class="grid-dot"/>
  <!-- y=5: all except 2, 4 -->
  <circle cx="70"  cy="345" r="2" class="grid-dot"/>
  <circle cx="160" cy="345" r="2" class="grid-dot"/>
  <circle cx="250" cy="345" r="2" class="grid-dot"/>
  <circle cx="295" cy="345" r="2" class="grid-dot"/>
  <circle cx="340" cy="345" r="2" class="grid-dot"/>

  <!-- Edges -->
  <!-- n(5,1) -> k(3,2) -->
  <line x1="250" y1="85" x2="160" y2="150" class="edge"/>
  <!-- n(5,1) -> u(7,2) -->
  <line x1="250" y1="85" x2="340" y2="150" class="edge"/>
  <!-- k(3,2) -> c(2,3) -->
  <line x1="160" y1="150" x2="115" y2="215" class="edge"/>
  <!-- k(3,2) -> m(4,3) -->
  <line x1="160" y1="150" x2="205" y2="215" class="edge"/>
  <!-- c(2,3) -> a(1,4) -->
  <line x1="115" y1="215" x2="70" y2="280" class="edge"/>
  <!-- c(2,3) -> e(3,4) -->
  <line x1="115" y1="215" x2="160" y2="280" class="edge"/>
  <!-- u(7,2) -> p(6,3) -->
  <line x1="340" y1="150" x2="295" y2="215" class="edge"/>
  <!-- p(6,3) -> q(7,4) -->
  <line x1="295" y1="215" x2="340" y2="280" class="edge"/>
  <!-- e(3,4) -> d(2,5) -->
  <line x1="160" y1="280" x2="115" y2="345" class="edge"/>
  <!-- e(3,4) -> g(4,5) -->
  <line x1="160" y1="280" x2="205" y2="345" class="edge"/>

  <!-- Nodes -->
  <!-- n at (5,1) -> px(250, 85) -->
  <circle cx="250" cy="85" r="15" class="node-circle"/>
  <text x="250" y="85" class="node-label">n</text>
  <!-- k at (3,2) -> px(160, 150) -->
  <circle cx="160" cy="150" r="15" class="node-circle"/>
  <text x="160" y="150" class="node-label">k</text>
  <!-- u at (7,2) -> px(340, 150) -->
  <circle cx="340" cy="150" r="15" class="node-circle"/>
  <text x="340" y="150" class="node-label">u</text>
  <!-- c at (2,3) -> px(115, 215) -->
  <circle cx="115" cy="215" r="15" class="node-circle"/>
  <text x="115" y="215" class="node-label">c</text>
  <!-- m at (4,3) -> px(205, 215) -->
  <circle cx="205" cy="215" r="15" class="node-circle"/>
  <text x="205" y="215" class="node-label">m</text>
  <!-- p at (6,3) -> px(295, 215) -->
  <circle cx="295" cy="215" r="15" class="node-circle"/>
  <text x="295" y="215" class="node-label">p</text>
  <!-- a at (1,4) -> px(70, 280) -->
  <circle cx="70" cy="280" r="15" class="node-circle"/>
  <text x="70" y="280" class="node-label">a</text>
  <!-- e at (3,4) -> px(160, 280) -->
  <circle cx="160" cy="280" r="15" class="node-circle"/>
  <text x="160" y="280" class="node-label">e</text>
  <!-- q at (7,4) -> px(340, 280) -->
  <circle cx="340" cy="280" r="15" class="node-circle"/>
  <text x="340" y="280" class="node-label">q</text>
  <!-- d at (2,5) -> px(115, 345) -->
  <circle cx="115" cy="345" r="15" class="node-circle"/>
  <text x="115" y="345" class="node-label">d</text>
  <!-- g at (4,5) -> px(205, 345) -->
  <circle cx="205" cy="345" r="15" class="node-circle"/>
  <text x="205" y="345" class="node-label">g</text>

  <!-- Coordinate labels -->
  <text x="250" y="108" class="x-label" fill="#2C5F8A" font-size="9">[5,1]</text>
  <text x="160" y="173" class="x-label" fill="#2C5F8A" font-size="9">[3,2]</text>
  <text x="340" y="173" class="x-label" fill="#2C5F8A" font-size="9">[7,2]</text>
  <text x="115" y="238" class="x-label" fill="#2C5F8A" font-size="9">[2,3]</text>
  <text x="205" y="238" class="x-label" fill="#2C5F8A" font-size="9">[4,3]</text>
  <text x="295" y="238" class="x-label" fill="#2C5F8A" font-size="9">[6,3]</text>
  <text x="70"  y="303" class="x-label" fill="#2C5F8A" font-size="9">[1,4]</text>
  <text x="160" y="303" class="x-label" fill="#2C5F8A" font-size="9">[3,4]</text>
  <text x="340" y="303" class="x-label" fill="#2C5F8A" font-size="9">[7,4]</text>
  <text x="115" y="368" class="x-label" fill="#2C5F8A" font-size="9">[2,5]</text>
  <text x="205" y="368" class="x-label" fill="#2C5F8A" font-size="9">[4,5]</text>

  <!-- Legend -->
  <rect x="20" y="388" width="360" height="25" rx="4" fill="#F5F5F5" stroke="#DDD"/>
  <text x="30" y="400" font-size="10" fill="#E07040" dominant-baseline="central" font-style="italic">Compact: every node centered above its children, no wasted space</text>
</svg>